        // M3U Modal Functions
        function openM3UModal() {
            document.getElementById('m3uModal').classList.add('active');
            document.getElementById('m3uUrlInput').value = '';
            document.getElementById('m3uFileInfo').style.display = 'none';
            m3uFileContent = '';
        }

        function closeM3UModal() {
            document.getElementById('m3uModal').classList.remove('active');
            document.getElementById('m3uUrlInput').value = '';
            document.getElementById('m3uFileInfo').style.display = 'none';
            document.getElementById('singleChannelName').value = '';

            m3uFileContent = '';

        function addSingleChannel() {
            const name = document.getElementById('singleChannelName').value.trim();
            const url = document.getElementById('singleChannelUrl').value.trim();

            if (!name || !url) {
                alert('Please enter both channel name and M3U8 URL');
                return;
            }

            if (!url.includes('.m3u8') && !url.includes('.m3u')) {
                alert('Please enter a valid M3U8 or M3U stream URL');
                return;
            }

            channels.push({
                id: nextChannelId++,
                name: name,
                number: channels.length + 1,
                category: 'Custom',
                url: url
            });

            renderChannels();
            document.getElementById('singleChannelName').value = '';
            document.getElementById('singleChannelUrl').value = '';
            closeM3UModal();
            alert(`Channel "${name}" added successfully!`);
        }

        function handleM3UFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                m3uFileContent = e.target.result;
                const lineCount = m3uFileContent.split('\n').filter(line => line.startsWith('#EXTINF')).length;
                document.getElementById('m3uFileInfo').innerHTML = `✓ File loaded: <strong>${file.name}</strong><br>Channels found: <strong>${lineCount}</strong>`;
                document.getElementById('m3uFileInfo').style.display = 'block';
            };
            reader.readAsText(file);
        }

        function parseM3U(content) {
            const lines = content.split('\n');
            const parsedChannels = [];
            let currentChannel = null;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();

                if (line.startsWith('#EXTINF:')) {
                    const parts = line.split(',');
                    const name = parts[parts.length - 1].trim();
                    const logoMatch = line.match(/tvg-logo="([^"]*)"/);
                    const logo = logoMatch ? logoMatch[1] : '';
                    const idMatch = line.match(/tvg-id="([^"]*)"/);
                    const id = idMatch ? idMatch[1] : '';

                    currentChannel = {
                        name: name,
                        logo: logo,
                        tvgId: id,
                        url: ''
                    };
                } else if (line && !line.startsWith('#') && currentChannel) {
                    currentChannel.url = line;
                    parsedChannels.push(currentChannel);
                    currentChannel = null;
                }
            }

            return parsedChannels;
        }

        async function importM3UPlaylist() {
            let m3uContent = m3uFileContent;
            const urlInput = document.getElementById('m3uUrlInput').value.trim();

            if (!m3uContent && urlInput) {
                try {
                    const response = await fetch(urlInput);
                    if (!response.ok) throw new Error('Failed to fetch M3U');
                    m3uContent = await response.text();
                } catch (error) {
                    alert('Error: Could not fetch M3U file from URL. Please check the URL and try again.');
                    return;
                }
            }

            if (!m3uContent) {
                alert('Please provide either a file or URL');
                return;
            }

            const parsedChannels = parseM3U(m3uContent);
            
            if (parsedChannels.length === 0) {
                alert('No channels found in the M3U file');
                return;
            }

            parsedChannels.forEach(ch => {
                channels.push({
                    id: nextChannelId++,
                    name: ch.name,
                    number: channels.length + 1,
                    category: 'Imported',
                    logo: ch.logo,
                    url: ch.url
                });
            });

            renderChannels();
            closeM3UModal();
            alert(`Successfully imported ${parsedChannels.length} channels!`);
        }

            const channelsList = document.getElementById('channelsList');
            channelsList.innerHTML = '';

            channels.forEach(channel => {

                btn.className = 'channel-btn';
                btn.dataset.channelId = channel.id;
                
                btn.innerHTML = `

                        </div>
                    </div>
                    <span class="channel-number">#${channel.number}</span>
                `;

                btn.onclick = () => playChannel(channel);
                btn.oncontextmenu = (e) => showContextMenu(e, channel.id);

                channelsList.appendChild(btn);

            lucide.createIcons();

        function playChannel(channel) {
            currentChannel = channel;
            
            // Update UI
            document.querySelectorAll('.channel-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-channel-id="${channel.id}"]`)?.classList.add('active');
            
            document.getElementById('channelName').textContent = channel.name;
            document.getElementById('channelStatus').textContent = `Now playing: ${channel.category}`;
            document.getElementById('videoPlaceholder').style.display = 'none';
            document.getElementById('liveBadge').style.display = 'inline-flex';

            // Video player setup
            const video = document.getElementById('videoPlayer');
            
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(channel.url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play();
                    isPlaying = true;
                    updatePlayerControls();
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = channel.url;
                video.play();
                isPlaying = true;
                updatePlayerControls();
            }

            video.style.display = 'block';
        }

        function updatePlayerControls() {
            const playBtn = document.getElementById('playerPlayBtn');
            const pauseBtn = document.getElementById('playerPauseBtn');
            
            if (isPlaying) {
                pauseBtn.classList.add('active');
                playBtn.classList.remove('active');
            } else {
                playBtn.classList.add('active');
                pauseBtn.classList.remove('active');
            }
        }

        // Player Control Event Listeners
        document.getElementById('playerPlayBtn')?.addEventListener('click', () => {
