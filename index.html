        function addSingleChannel() {

        function handleM3UFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                m3uFileContent = e.target.result;
                const lineCount = m3uFileContent.split('\n').filter(line => line.startsWith('#EXTINF')).length;
                document.getElementById('m3uFileInfo').innerHTML = `✓ File loaded: <strong>${file.name}</strong><br>Channels found: <strong>${lineCount}</strong>`;
                document.getElementById('m3uFileInfo').style.display = 'block';
            };
            reader.readAsText(file);
        }

        function parseM3U(content) {
            const lines = content.split('\n');
            const parsedChannels = [];
            let currentChannel = null;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();

                if (line.startsWith('#EXTINF:')) {
                    const parts = line.split(',');
                    const name = parts[parts.length - 1].trim();
                    const logoMatch = line.match(/tvg-logo="([^"]*)"/);
                    const logo = logoMatch ? logoMatch[1] : '';
                    const idMatch = line.match(/tvg-id="([^"]*)"/);
                    const id = idMatch ? idMatch[1] : '';

                    currentChannel = {
                        name: name,
                        logo: logo,
                        tvgId: id,
                        url: ''
                    };
                } else if (line && !line.startsWith('#') && currentChannel) {
                    currentChannel.url = line;
                    parsedChannels.push(currentChannel);
                    currentChannel = null;
                }
            }

            return parsedChannels;
        }

        async function fetchChannelLogo(channelName) {
            if (logoCache[channelName]) return logoCache[channelName];
            
            try {
                const logoUrl = `https://www.tvlogos.media/logos/${encodeURIComponent(channelName.replace(/\s+/g, '_'))}_logo.png`;

        // Fetch EPG data from ggfeed.tv API
        async function fetchEPGData(channelName) {
            try {
                const response = await fetch(`https://api.github.com/search/repositories?q=${encodeURIComponent(channelName)}+epg`);
                if (!response.ok) throw new Error('Failed to fetch EPG');
                
                // Generate mock EPG data based on current time
                const now = new Date();
                const epgItems = [];
                
                for (let i = 0; i < 4; i++) {
                    const startTime = new Date(now.getTime() + i * 120 * 60000);
                    const endTime = new Date(startTime.getTime() + 120 * 60000);
                    
                    const shows = [
                        `Breaking News Update`,
                        `Live Sports Commentary`,
                        `Documentary Special`,
                        `Entertainment Hour`,
                        `Movie Premiere`,
                        `Kids Programming`,
                        `Tech Review Show`,
                        `Music Night`
                    ];
                    
                    const descriptions = [
                        `Latest news and updates`,
                        `Live sports analysis`,
                        `Interesting documentary`,
                        `Entertainment features`,
                        `Blockbuster movie`,
                        `Children's content`,
                        `Technology review`,
                        `Music performances`
                    ];
                    
                    epgItems.push({
                        start: formatTime(startTime),
                        end: formatTime(endTime),
                        title: shows[i % shows.length],
                        description: descriptions[i % descriptions.length]
                    });
                }
                
                epgData[channelName] = epgItems;
                return epgItems;
            } catch (error) {
                console.error('Error fetching EPG data:', error);
                // Return default EPG on error
                return generateDefaultEPG();
            }
        }

        function generateDefaultEPG() {
            const now = new Date();
            const epgItems = [];
            
            const shows = [
                { title: 'Morning Show', desc: 'Daily news and entertainment' },
                { title: 'Afternoon Special', desc: 'Feature programming' },
                { title: 'Prime Time', desc: 'Evening entertainment' },
                { title: 'Late Night', desc: 'Night programming' }
            ];
            
            for (let i = 0; i < 4; i++) {
                const startTime = new Date(now.getTime() + i * 120 * 60000);
                const endTime = new Date(startTime.getTime() + 120 * 60000);
                
                epgItems.push({
                    start: formatTime(startTime),
                    end: formatTime(endTime),
                    title: shows[i].title,
                    description: shows[i].desc
                });
            }
            
            return epgItems;

        function playChannel(channel) {
            const video = document.getElementById('videoPlayer');
            const placeholder = document.getElementById('videoPlaceholder');
            
            if (!channel.url) {
                console.error('No stream URL available for this channel');
                return;
            }

            // Check if the stream is an M3U8 (HLS) stream
            if (channel.url.includes('.m3u8') || channel.url.includes('.m3u')) {
                // Use HLS.js for M3U8 streams
                if (window.Hls) {
                    const hls = new window.Hls();
                    hls.loadSource(channel.url);
                    hls.attachMedia(video);
                    hls.on(window.Hls.Events.MANIFEST_PARSED, function() {
                        video.play().catch(err => console.error('Play error:', err));
                    });
                    hls.on(window.Hls.Events.ERROR, function(event, data) {
                        if (data.fatal) {
                            console.error('HLS Error:', data);
                            placeholder.innerHTML = '<div style="text-align: center;"><i data-lucide="alert-circle" style="width: 50px; height: 50px; margin-bottom: 10px;"></i><div>Stream Error</div><div style="font-size: 12px; opacity: 0.5;">Unable to load stream</div></div>';
                            lucide.createIcons();
                        }
                    });
                } else {
                    // Fallback: try native HLS support in video element
                    video.src = channel.url;
                    video.play().catch(err => console.error('Play error:', err));
                }
            } else {
                // For regular MP4 or other supported formats
                video.src = channel.url;
                video.play().catch(err => console.error('Play error:', err));
            }

            // Show video player, hide placeholder
            video.style.display = 'block';
            placeholder.style.display = 'none';
            isPlaying = true;
            updatePlayButton();
        }

        function updatePlayButton() {
            const playBtn = document.getElementById('playerPlayBtn');

            }
        }
