<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    overflow:hidden;

    background:
    radial-gradient(circle at top left,#4f00ff 0%,#130022 35%,#05010d 100%);

    color:white;
}

/* MAIN */

.container{
    display:flex;
    gap:18px;
    padding:18px;
    height:100vh;
}

/* LEFT */

.left{
    flex:1;
    display:flex;
    flex-direction:column;
}

/* LOGO */

.logo{
    display:flex;
    align-items:center;
    gap:14px;
    margin-bottom:16px;
}

.logo-icon{

    width:42px;
    height:42px;

    border-radius:12px;

    background:
    linear-gradient(135deg,#ff00cc,#7d2cff);

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:22px;
    font-weight:700;

    box-shadow:
    0 0 18px rgba(255,0,200,0.35);
}

.logo-text h1{
    font-size:28px;
    font-weight:700;
}

.logo-text p{

    font-size:10px;
    letter-spacing:3px;
    color:#888;
}

/* PLAYER */

.player-box{

    position:relative;

    flex:1;

    overflow:hidden;

    border-radius:28px;

    background:
    rgba(255,255,255,0.05);

    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    border:
    1px solid rgba(255,255,255,0.05);

    box-shadow:
    0 8px 30px rgba(0,0,0,0.4);
}

video{

    width:100%;
    height:100%;

    object-fit:contain;

    background:black;

    outline:none;
}


/* PLAYER CONTROLS */

.player-overlay{

    position:absolute;

    left:0;
    right:0;
    bottom:0;

    padding:20px;

    background:
    linear-gradient(
        to top,
        rgba(0,0,0,0.78),
        transparent
    );
}

.controls{

    display:flex;
    align-items:center;
    gap:14px;
}

.glass-btn{

    width:46px;
    height:46px;

    border:none;

    border-radius:14px;

    cursor:pointer;

    color:white;

    font-size:18px;

    background:
    rgba(255,255,255,0.08);

    backdrop-filter:blur(14px);

    border:
    1px solid rgba(255,255,255,0.08);

    transition:.25s;
}

.glass-btn:hover{

    transform:scale(1.08);

    background:
    rgba(255,255,255,0.16);
}

/* PROGRESS */

.progress-wrap{

    flex:1;

    height:6px;

    border-radius:20px;

    overflow:hidden;

    background:
    rgba(255,255,255,0.12);

    cursor:pointer;
}

.progress{

    width:0%;

    height:100%;

    border-radius:20px;

    background:
    linear-gradient(90deg,#ff00cc,#7d2cff);
}

/* TIME */

.time{

    font-size:13px;

    color:#ddd;
}

/* CHANNEL CARD */

.channel-card{

    margin-top:16px;

    padding:22px 24px;

    border-radius:24px;

    background:
    rgba(255,255,255,0.05);

    backdrop-filter:blur(18px);

    border:
    1px solid rgba(255,255,255,0.06);

    box-shadow:
    0 8px 30px rgba(0,0,0,0.3);
}

.channel-live{

    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:12px;
}

.live-dot{

    width:10px;
    height:10px;

    border-radius:50%;

    background:#ff3355;

    box-shadow:
    0 0 12px #ff3355;
}

.channel-live span{

    font-size:11px;

    letter-spacing:2px;

    color:#ff4b73;

    font-weight:600;
}

.channel-main-name{

    font-size:28px;

    font-weight:700;

    margin-bottom:6px;
}

.channel-sub{

    font-size:13px;

    color:#999;
}

/* SIDEBAR */

.sidebar{

    width:460px;

    overflow:hidden;

    border-radius:30px;

    padding:16px;

    background:
    rgba(8,8,15,0.72);

    backdrop-filter:blur(24px);

    border:
    1px solid rgba(255,255,255,0.05);

    display: flex;
    flex-direction: column;
}

.sidebar-title{

    text-align:center;

    font-size:11px;

    letter-spacing:4px;

    color:#777;

    margin-bottom:14px;
}

/* CATEGORY SLIDER */

.category-slider {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    white-space: nowrap;
    padding-bottom: 12px;
    margin-bottom: 12px;
    scrollbar-width: none; /* Hide scrollbar Firefox */
    -ms-overflow-style: none; /* Hide scrollbar IE/Edge */
    -webkit-overflow-scrolling: touch; /* Fast smooth touch scrolling on iOS */
}

.category-slider::-webkit-scrollbar {
    display: none; /* Hide scrollbar Chrome/Safari */
}

.category-item {
    display: inline-block;
    padding: 8px 16px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: 0.25s;
    color: #aaa;
    flex-shrink: 0;
}

.category-item:hover {
    background: rgba(255, 255, 255, 0.1);
    color: #fff;
}

.category-item.active {
    background: linear-gradient(135deg, rgba(180,0,255,0.3), rgba(255,0,180,0.2));
    border: 1px solid rgba(255,0,200,0.5);
    color: #fff;
    box-shadow: 0 0 12px rgba(255,0,200,0.2);
}

/* CHANNEL LIST */

.channel-list{

    flex: 1;

    overflow-y:auto;

    overflow-x:hidden;

    padding-right:2px;
}

/* SCROLLBAR */

.channel-list::-webkit-scrollbar{
    width:3px;
}

.channel-list::-webkit-scrollbar-thumb{

    background:
    rgba(255,255,255,0.15);

    border-radius:20px;
}

/* CHANNEL (ANIMATED REMIX) */

.channel{
    padding:12px 14px;
    margin-bottom:9px;
    border-radius:16px;
    cursor:pointer;
    background: linear-gradient(135deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
    border: 1px solid rgba(255,255,255,0.03);
    
    /* Smooth fluid layout transformations using custom cubic-bezier curves */
    transition: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1);
    position: relative;
    left: 0;
}

/* Glowing Neon Vertical Border Ribbon Overlay */
.channel::before {
    content: '';
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%) scaleY(0.3);
    width: 4px;
    height: 60%;
    background: linear-gradient(to bottom, #ff00cc, #7d2cff);
    border-radius: 0 4px 4px 0;
    opacity: 0;
    transition: all 0.3s ease;
}

.channel:hover{
    transform: translateX(6px) scale(1.01);
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.1);
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
}

.channel:hover::before {
    opacity: 0.5;
    transform: translateY(-50%) scaleY(0.7);
}

.channel.active{
    transform: translateX(8px) scale(1.02);
    background: linear-gradient(135deg, rgba(180,0,255,0.25), rgba(255,0,180,0.15));
    border: 1px solid rgba(255,0,200,0.55);
    box-shadow: 0 0 20px rgba(255,0,200,0.25), 0 8px 25px rgba(0,0,0,0.4);
}

.channel.active::before {
    opacity: 1;
    transform: translateY(-50%) scaleY(1);
    height: 70%;
}

.category {

    font-size:9px;

    color:#909090;

    letter-spacing:1.4px;

    text-transform:uppercase;

    margin-bottom:4px;
}

.name{

    font-size:14px;

    font-weight:600;
}

/* MOBILE */

@media(max-width:1400px){

    body{
        overflow:auto;
    }

    .container{
        flex-direction:column;
        height:auto;
    }

    .sidebar{
        width:100%;
        height: 500px;
    }
}

</style>

/* EPG */

const epgData = {

    "Star Sports Select 1 HD":{
        title:"Live Cricket Championship",
        time:"08:00 PM - 11:00 PM"
    },

    "TNT SPORTS 4":{
        title:"UEFA Champions League",
        time:"09:00 PM - 11:30 PM"
    },

    "Somoy TV HD":{
        title:"Breaking News Bulletin",
        time:"LIVE"
    },

    "Banglavision HD":{
        title:"Drama Serial Premiere",
        time:"07:00 PM - 08:00 PM"
    }
};

/* ELEMENTS */

const video =
document.getElementById("video");

const channelList =
document.getElementById("channelList");

const categorySlider =
document.getElementById("categorySlider");

const progress =
document.getElementById("progress");

const progressWrap =
document.getElementById("progressWrap");

const playBtn =
document.getElementById("playBtn");

const muteBtn =
document.getElementById("muteBtn");

const fullscreenBtn =
document.getElementById("fullscreenBtn");

const epgTitle =
document.getElementById("epgTitle");

const epgTime =
document.getElementById("epgTime");

const currentChannel =
document.getElementById("currentChannel");

let hls;
let activeChannelUrl = ""; 

/* LOAD IPTV / HLS STREAM */

function loadStream(url){

    console.log("Loading:",url);
    activeChannelUrl = url;

    /* DESTROY OLD PLAYER */

    if(hls){
        hls.destroy();
        hls = null;
    }

    video.pause();

    video.removeAttribute("src");

    video.load();

    /* HLS / M3U8 */

    if(url.includes(".m3u8")){

        /* HLS.JS SUPPORTED */

        if(Hls.isSupported()){

            hls = new Hls({

                debug:false,

                enableWorker:true,

                lowLatencyMode:true,

                backBufferLength:90,

                maxBufferLength:120,

                liveSyncDurationCount:3,

                liveMaxLatencyDurationCount:10,

                xhrSetup:function(xhr){

                    xhr.withCredentials = false;

                }

            });

            hls.loadSource(url);

            hls.attachMedia(video);

            /* READY */

            hls.on(
                Hls.Events.MANIFEST_PARSED,
                function(){

                    console.log("HLS READY");

                    video.muted = false;

                    video.play()
                    .then(()=>{

                        playBtn.innerText = "❚❚";

                    })
                    .catch(err=>{

                        console.log(err);

                    });

                }
            );

            /* ERROR HANDLING */

            hls.on(
                Hls.Events.ERROR,
                function(event,data){

                    console.log("HLS ERROR:",data);

                    if(data.fatal){

                        switch(data.type){

                            case Hls.ErrorTypes.NETWORK_ERROR:

                                console.log("NETWORK ERROR");

                                hls.startLoad();

                                break;

                            case Hls.ErrorTypes.MEDIA_ERROR:

                                console.log("MEDIA ERROR");

                                hls.recoverMediaError();

                                break;

                            default:

                                hls.destroy();

                                break;
                        }
                    }
                }
            );
        }

        /* IOS / SAFARI */

        else if(
            video.canPlayType(
                'application/vnd.apple.mpegurl'
            )
        ){

            video.src = url;

            video.addEventListener(
                'loadedmetadata',
                function(){

                    video.play();

                }
            );
        }
    }

    /* NORMAL VIDEO */

    else{

        video.src = url;

        video.load();

        video.play()
        .then(()=>{

            playBtn.innerText = "❚❚";

        })
        .catch(err=>{

            console.log(err);

        });
    }
}

/* UPDATE EPG */

function updateEPG(channelName){

    const epg = epgData[channelName];

    if(epg){

        if(epgTitle) epgTitle.innerText = epg.title;

        if(epgTime) epgTime.innerText = epg.time;
    }

    else{

        if(epgTitle) epgTitle.innerText = "No EPG Available";

        if(epgTime) epgTime.innerText = "LIVE";
    }
}

/* RENDER CATEGORY SLIDER */
function renderCategories(){
    const uniqueCategories = ["All", ...new Set(channels.map(c => c.category))];
    
    categorySlider.innerHTML = "";
    
    uniqueCategories.forEach((cat, index) => {
        const div = document.createElement("div");
        div.classList.add("category-item");
        if(index === 0) div.classList.add("active");
        div.innerText = cat;
        
        div.onclick = () => {
            document.querySelectorAll(".category-item").forEach(el => el.classList.remove("active"));
            div.classList.add("active");
            renderChannels(cat);
        };
        
        categorySlider.appendChild(div);
    });
}

/* RENDER CHANNELS WITH FILTER */
function renderChannels(filterCategory = "All"){
    channelList.innerHTML = "";

    channels.forEach((channel)=>{
        if(filterCategory !== "All" && channel.category !== filterCategory) return;

        const div = document.createElement("div");
        div.classList.add("channel");

        if(channel.url === activeChannelUrl){
            div.classList.add("active");
        }

        div.innerHTML = `
            <div class="category">
                ${channel.category}
            </div>
            <div class="name">
                ${channel.name}
            </div>
        `;

        div.onclick = () => {
            document.querySelectorAll(".channel").forEach(el => el.classList.remove("active"));
            div.classList.add("active");

            loadStream(channel.url);
            updateEPG(channel.name);
            currentChannel.innerText = channel.name;
        };

        channelList.appendChild(div);
    });
}

/* PLAY / PAUSE */

playBtn.onclick = () => {

    if(video.paused){

        video.play();

        playBtn.innerText = "❚❚";
    }

    else{

        video.pause();

        playBtn.innerText = "▶";
    }
};

/* MUTE */

muteBtn.onclick = () => {

    video.muted = !video.muted;

    muteBtn.innerText =
    video.muted ? "🔇" : "🔊";
};

/* FULLSCREEN (WITH MOBILE FALLBACK SUPPORT) */
fullscreenBtn.onclick = () => {
    if (video.requestFullscreen) {
        video.requestFullscreen();
    } else if (video.webkitEnterFullscreen) {
        video.webkitEnterFullscreen();
    } else if (video.webkitRequestFullscreen) {
        video.webkitRequestFullscreen();
    } else if (video.mozRequestFullScreen) {
        video.mozRequestFullScreen();
    } else if (video.msRequestFullscreen) {
        video.msRequestFullscreen();
    }
};

/* PROGRESS */

video.addEventListener("timeupdate",()=>{

    if(video.duration){

        const percent =
        (video.currentTime / video.duration) * 100;

        progress.style.width =
        percent + "%";
    }
});

/* SEEK */

progressWrap.onclick = (e)=>{

    if(video.duration){

        const width =
        progressWrap.clientWidth;

        const clickX =
        e.offsetX;

        video.currentTime =
        (clickX / width) * video.duration;
    }
};

/* DESKTOP MOUSE WHEEL SCROLLING FOR CATEGORY BOX */
categorySlider.addEventListener("wheel", (evt) => {
    evt.preventDefault();
    categorySlider.scrollLeft += evt.deltaY;
});

/* INIT */
renderCategories();
activeChannelUrl = channels[0].url;
renderChannels();
loadStream(channels[0].url);
updateEPG(channels[0].name);

</script>
