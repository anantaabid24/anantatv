<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ananta Stream Pro</title>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        :root {
            --bg: #030208;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-thick: rgba(0, 0, 0, 0.9);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent: #d11fb5;
            --live-red: #ff3131;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 0% 0%, #1a0b35 0%, transparent 60%);
            margin: 0; display: flex; height: 100vh; color: #fff; overflow: hidden;
        }

        /* --- Logo & Tagline --- */
        .brand-logo {
            position: absolute; top: 25px; left: 40px; z-index: 100;
            display: flex; flex-direction: column; gap: 4px;
        }
        .logo-main { display: flex; align-items: center; gap: 12px; }
        .logo-symbol {
            width: 48px; height: 48px; background: linear-gradient(135deg, var(--accent), #701fd1);
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(209, 31, 181, 0.4); font-weight: 900; font-size: 1.2rem;
        }
        .logo-text { font-size: 1.6rem; font-weight: 900; letter-spacing: -0.5px; color: white; }
        
        .tagline {
            font-size: 0.7rem; font-weight: 600; letter-spacing: 2.5px; text-transform: uppercase;
            background: linear-gradient(90deg, rgba(255,255,255,0.4) 0%, #fff 50%, rgba(255,255,255,0.4) 100%);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite; margin-left: 5px;
        }

        @keyframes shimmer { to { background-position: 200% center; } }

        .main-content { flex: 1; display: flex; flex-direction: column; padding: 115px 30px 30px 40px; gap: 20px; }

        /* --- Player Container --- */
        #player-container {
            flex: 1; position: relative; background: #000; border-radius: 40px;
            overflow: hidden; border: 1px solid var(--glass-border);
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
        }
        video { width: 100%; height: 100%; object-fit: contain; }

        /* --- NEW PRO CONTROLLER --- */
        .controls-bar {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(20px);
            background: var(--glass-transparent); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 120px;
            padding: 9px 120px; display: flex; align-items: center; gap: 45px;
            opacity: 0; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            z-index: 10;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), 0 0 30px rgba(209, 31, 181, 0.1);
        }
        #player-container:hover .controls-bar { opacity: 1; transform: translateX(-50%) translateY(0); }

        .btn { background: none; border: none; color: white; cursor: pointer; font-size: 2rem; padding: 12px; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .btn:hover { color: var(--accent); transform: scale(1.2); text-shadow: 0 0 15px var(--accent); }

        #exit-fs { display: none; position: absolute; top: 30px; right: 30px; background: rgba(255,255,255,0.1); color: white; border-radius: 50%; width: 55px; height: 55px; font-weight: bold; border: 1px solid var(--glass-border); cursor: pointer; z-index: 20; backdrop-filter: blur(15px); font-size: 1.2rem; }
        :fullscreen #exit-fs { display: block; }

        /* --- Status Info Bar --- */
        .status-bar {
            background: var(--glass-transparent); backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border); border-radius: 35px;
            padding: 28px 50px; display: flex; align-items: center; justify-content: space-between;
        }
        .active-ch-info { display: flex; align-items: center; gap: 20px; }
        .active-ch-info h2 { margin: 0; font-size: 2.3rem; font-weight: 800; }

        .live-tag { display: flex; align-items: center; gap: 10px; font-weight: 900; color: var(--live-red); font-size: 0.8rem; letter-spacing: 3px; }
        .pulse { width: 12px; height: 12px; background: var(--live-red); border-radius: 50%; position: relative; }
        .pulse::after { content: ''; position: absolute; width: 100%; height: 100%; background: var(--live-red); border-radius: 50%; animation: ring 2s infinite; }
        @keyframes ring { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(4.2); opacity: 0; } }

        /* --- Sidebar --- */
        .sidebar {
            width: 420px; margin: 25px; background: var(--glass);
            backdrop-filter: blur(40px); border: 1px solid var(--glass-border);
            border-radius: 40px; padding: 35px 20px; display: flex; flex-direction: column;
        }
        .channel-list { flex: 1; overflow-y: auto; padding-right: 10px; }
        .card {
            padding: 20px; margin-bottom: 12px; border-radius: 22px;
            background: rgba(255,255,255,0.02); border: 1px solid transparent;
            cursor: pointer; transition: 0.3s;
        }
        .card:hover { background: rgba(255,255,255,0.08); transform: translateX(10px); }
        .card.active { border-color: var(--accent); background: rgba(209, 31, 181, 0.15); }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>

        let hls = null;
        let epgDoc = null;
        const video = document.getElementById('video');

        async function fetchEPG() {
            try {
                const r = await fetch(EPG_URL);
                const b = await r.arrayBuffer();
                const d = pako.ungzip(new Uint8Array(b), { to: 'string' });
                epgDoc = new DOMParser().parseFromString(d, "application/xml");
                updateEPG();
            } catch (e) { document.getElementById('epg-title').textContent = "Live Broadcast"; }
        }

        function updateEPG() {
            const active = channels.find(c => document.getElementById(`ch-${c.id}`).classList.contains('active'));
            if (!active) return;
            document.getElementById('current-name').textContent = active.name;
            if (!epgDoc) return;
            const now = new Date();
            const progs = Array.from(epgDoc.querySelectorAll(`programme[channel="${active.xmlId}"]`));
            const curr = progs.find(p => now >= pDate(p.getAttribute('start')) && now <= pDate(p.getAttribute('stop')));
            if (curr) {
                document.getElementById('epg-title').textContent = curr.querySelector('title').textContent;
                document.getElementById('epg-time').textContent = `${fTime(curr.getAttribute('start'))} - ${fTime(curr.getAttribute('stop'))}`;
            } else {
                document.getElementById('epg-title').textContent = "Program Guide Unavailable";
                document.getElementById('epg-time').textContent = "--:--";
            }
        }

        function pDate(s) { return new Date(`${s.substr(0,4)}-${s.substr(4,2)}-${s.substr(6,2)}T${s.substr(8,2)}:${s.substr(10,2)}:00`); }
        function fTime(s) { return `${s.substr(8,2)}:${s.substr(10,2)}`; }

        function selectChannel(ch) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            const el = document.getElementById(`ch-${ch.id}`);
            if(el) el.classList.add('active');
            if (Hls.isSupported()) {
                if (hls) hls.destroy();
                hls = new Hls(); hls.loadSource(ch.url); hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            }
            updateEPG();
        }

        function togglePlay() { video.paused ? (video.play(), document.getElementById('play-btn').textContent='⏸') : (video.pause(), document.getElementById('play-btn').textContent='▶'); }
        function toggleMute() { video.muted = !video.muted; document.getElementById('mute-btn').textContent = video.muted ? '🔇' : '🔊'; }
        function enterFullscreen() { const c = document.getElementById('player-container'); if (c.requestFullscreen) c.requestFullscreen(); else if (c.webkitRequestFullscreen) c.webkitRequestFullscreen(); }
        function exitFullscreen() { if (document.exitFullscreen) document.exitFullscreen(); else if (document.webkitExitFullscreen) document.webkitExitFullscreen(); }

        const list = document.getElementById('ui-list');
        channels.forEach(ch => {
            const el = document.createElement('div');
            el.className = 'card'; el.id = `ch-${ch.id}`;
            el.innerHTML = `<div style="font-size:0.6rem; opacity:0.3; letter-spacing:1px;">${ch.category}</div><strong>${ch.name}</strong>`;
            el.onclick = () => selectChannel(ch);
            list.appendChild(el);
        });

        fetchEPG();
        selectChannel(channels[0]);
        setInterval(updateEPG, 30000);
    </script>
