<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KB ISP TV | Pro Media Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --accent: #3b82f6; --glass: rgba(10, 15, 25, 0.75); }
        body { 
            background: radial-gradient(circle at top right, #0f172a, #020617);
            color: #f8fafc; font-family: 'Inter', system-ui, sans-serif;
        }
        .pro-glass { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .channel-btn { 
            background: rgba(30, 41, 59, 0.4); 
            border: 1px solid #1e293b; 
            transition: 0.3s; 
        }
        .channel-btn:hover { 
            background: rgba(30, 41, 59, 0.8); 
            border-color: var(--accent); 
            transform: translateX(5px); 
        }
        .live-pulse { 
            box-shadow: 0 0 0 rgba(34, 197, 94, 0.4); 
            animation: pulse-green 2s infinite; 
        }
        @keyframes pulse-green { 
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); } 
            70% { box-shadow: 0 0 0 8px rgba(34, 197, 94, 0); } 
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } 
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        #add-modal { transition: opacity 0.3s ease; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="pro-glass sticky top-0 z-50 p-5 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-xl flex items-center justify-center font-bold text-xl shadow-lg shadow-blue-500/20">K</div>
            <h1 class="text-2xl font-black tracking-tighter">KB <span class="text-blue-500">ISP TV</span></h1>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="toggleModal()" 
                    class="px-4 py-2 bg-blue-600/20 hover:bg-blue-600/40 border border-blue-500/30 rounded-lg text-[10px] font-bold uppercase tracking-widest transition">
                + Add Channel
            </button>
            <a id="partner-link" href="https://kbtvpro.totalh.net/" target="_blank" 
               class="hidden md:block px-5 py-2 bg-white/5 hover:bg-white/10 rounded-lg text-[11px] font-bold uppercase tracking-widest transition border border-white/10 backdrop-blur-md">
               Partner: KBTV PRO
            </a>
            <div class="flex items-center gap-2 text-[10px] text-green-500 font-bold uppercase tracking-widest">
                <span class="live-pulse w-2 h-2 bg-green-500 rounded-full"></span> Live
            </div>
        </div>
    </header>

    <main class="flex-1 flex flex-col lg:flex-row overflow-hidden p-6 gap-6">
        <section class="flex-[3] flex flex-col gap-6">
            <div class="aspect-video bg-black rounded-2xl border border-white/10 shadow-2xl overflow-hidden relative">
                <video id="video" class="w-full h-full" controls autoplay playsinline></video>
            </div>
            <div class="pro-glass p-8 rounded-2xl">
                <h2 id="now-playing" class="text-3xl font-bold truncate">Select a channel</h2>
                <p id="now-playing-cat" class="text-blue-400 font-medium">Ready for broadcast</p>
            </div>
        </section>

        <aside class="flex-1 lg:max-w-xs flex flex-col gap-4">
            <input type="text" id="search" placeholder="Search channels..." 
                   class="w-full p-4 rounded-xl bg-white/5 border border-white/10 text-sm focus:outline-none focus:border-blue-500 transition"
                   onkeyup="filterChannels()">
            
            <div id="filter-bar" class="flex gap-2 overflow-x-auto scrollbar-hide pb-2"></div>
            
            <div id="list" class="flex-1 overflow-y-auto pr-2 space-y-2"></div>
        </aside>
    </main>

    <!-- Add Channel Modal -->
    <div id="add-modal" class="hidden fixed inset-0 z-[60] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4">
        <div class="pro-glass w-full max-w-md p-8 rounded-3xl shadow-2xl border border-white/10">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-white">Add Custom Channel</h3>
                <button onclick="toggleModal()" class="text-slate-400 hover:text-white text-3xl leading-none">&times;</button>
            </div>
            
            <div class="space-y-5">
                <div>
                    <label class="text-[10px] uppercase tracking-widest text-slate-400 font-bold mb-1 block">Channel Name</label>
                    <input type="text" id="new-name" placeholder="e.g. My Custom Stream" 
                           class="w-full p-3 rounded-xl bg-white/5 border border-white/10 text-sm focus:border-blue-500 outline-none">
                </div>
                
                <div>
                    <label class="text-[10px] uppercase tracking-widest text-slate-400 font-bold mb-1 block">Stream URL (HLS/M3U8)</label>
                    <input type="url" id="new-url" placeholder="https://example.com/stream.m3u8" 
                           class="w-full p-3 rounded-xl bg-white/5 border border-white/10 text-sm focus:border-blue-500 outline-none">
                </div>
                
                <div>
                    <label class="text-[10px] uppercase tracking-widest text-slate-400 font-bold mb-1 block">Category</label>
                    <select id="new-category" 
                            class="w-full p-3 rounded-xl bg-white/5 border border-white/10 text-sm focus:border-blue-500 outline-none">
                        <option value="General">General</option>
                        <option value="Sports">Sports</option>
                        <option value="News">News</option>
                        <option value="Movies">Movies</option>
                        <option value="Music">Music</option>
                        <option value="Custom">Custom</option>
                    </select>
                </div>

                <div class="flex gap-3 pt-4">
                    <button onclick="toggleModal()" 
                            class="flex-1 py-3 rounded-2xl border border-white/10 hover:bg-white/5 transition">
                        Cancel
                    </button>
                    <button onclick="addCustomChannel()" 
                            class="flex-1 py-3 bg-blue-600 hover:bg-blue-500 rounded-2xl font-semibold transition">
                        Add Channel
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let channels = [
            {
                name: "Channel 24",
                url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1703/output/index.m3u8",
                category: "News"
            },

           {
                name: "Independent",
                url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1704/output/index.m3u8",
                category: "News"
            },
            {
                name: "Somoy tv",
                url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1702/output/index.m3u8",
                category: "News"
            }
        ];

        let currentChannel = null;
        let hls = null;

        // Load channels from localStorage
        function loadChannels() {
            const saved = localStorage.getItem('kbisp_channels');
            if (saved) {
                channels = JSON.parse(saved);
            }
            renderChannels();
            renderFilters();
        }

        function saveChannels() {
            localStorage.setItem('kbisp_channels', JSON.stringify(channels));
        }

        function renderChannels(filteredChannels = channels) {
            const list = document.getElementById('list');
            list.innerHTML = '';

            filteredChannels.forEach((ch, index) => {
                const btn = document.createElement('button');
                btn.className = `channel-btn w-full text-left p-4 rounded-2xl flex items-center gap-3 group`;
                btn.innerHTML = `
                    <div class="w-8 h-8 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-xl flex items-center justify-center text-xs font-bold flex-shrink-0">
                        ${ch.name.substring(0,1)}
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="font-semibold truncate">${ch.name}</p>
                        <p class="text-xs text-slate-400">${ch.category}</p>
                    </div>
                `;
                btn.onclick = () => playChannel(ch);
                list.appendChild(btn);
            });
        }

        function renderFilters() {
            const categories = [...new Set(channels.map(ch => ch.category))];
            const bar = document.getElementById('filter-bar');
            bar.innerHTML = `<button onclick="filterByCategory('All')" class="filter-btn active px-5 py-1.5 text-xs font-medium rounded-full whitespace-nowrap">All</button>`;
            
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `filter-btn px-5 py-1.5 text-xs font-medium rounded-full whitespace-nowrap border border-white/10 hover:border-blue-500/50`;
                btn.textContent = cat;
                btn.onclick = () => filterByCategory(cat);
                bar.appendChild(btn);
            });
        }

        function filterByCategory(cat) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active', 'bg-blue-600', 'text-white'));
            
            if (cat === 'All') {
                renderChannels(channels);
                document.querySelector('.filter-btn').classList.add('active', 'bg-blue-600', 'text-white');
            } else {
                const filtered = channels.filter(ch => ch.category === cat);
                renderChannels(filtered);
                // Highlight active filter
                const activeBtn = Array.from(document.querySelectorAll('.filter-btn')).find(b => b.textContent === cat);
                if (activeBtn) activeBtn.classList.add('active', 'bg-blue-600', 'text-white');
            }
        }

        function filterChannels() {
            const query = document.getElementById('search').value.toLowerCase();
            const filtered = channels.filter(ch => 
                ch.name.toLowerCase().includes(query)
            );
            renderChannels(filtered);
        }

        function playChannel(channel) {
            currentChannel = channel;
            document.getElementById('now-playing').textContent = channel.name;
            document.getElementById('now-playing-cat').textContent = channel.category;

            const video = document.getElementById('video');
            
            if (hls) {
                hls.destroy();
            }

            if (Hls.isSupported()) {
                hls = new Hls();
                hls.loadSource(channel.url);
                hls.attachMedia(video);
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = channel.url;
            }
        }

        function addCustomChannel() {
            const name = document.getElementById('new-name').value.trim();
            const url = document.getElementById('new-url').value.trim();
            const category = document.getElementById('new-category').value;

            if (!name || !url) {
                alert("Please enter both channel name and stream URL");
                return;
            }

            channels.unshift({
                name: name,
                url: url,
                category: category
            });

            saveChannels();
            renderChannels();
            renderFilters();
            toggleModal();

            // Clear inputs
            document.getElementById('new-name').value = '';
            document.getElementById('new-url').value = '';

            alert(`✅ Channel "${name}" added successfully!`);
        }

        function toggleModal() {
            const modal = document.getElementById('add-modal');
            modal.classList.toggle('hidden');
        }

        // Initialize
        window.onload = function() {
            loadChannels();
            
            // Play first channel by default
            if (channels.length > 0) {
                setTimeout(() => {
                    playChannel(channels[0]);
                }, 500);
            }
        };
    </script>
</body>
</html>
